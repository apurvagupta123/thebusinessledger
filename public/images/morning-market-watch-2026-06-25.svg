<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <!-- Sunrise gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#0d2444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <!-- Gold sunrise glow -->
    <radialGradient id="sunriseGlow" cx="20%" cy="75%" r="60%">
      <stop offset="0%" style="stop-color:#f5b942;stop-opacity:0.35" />
      <stop offset="50%" style="stop-color:#e8922a;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0" />
    </radialGradient>
    <!-- Accent glow top right -->
    <radialGradient id="accentGlow" cx="85%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0" />
    </radialGradient>
    <!-- Gold line gradient -->
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5b942;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#f5b942;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#f5b942;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b942;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#sunriseGlow)"/>
  <rect width="1200" height="630" fill="url(#accentGlow)"/>

  <!-- Grid pattern subtle -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#f5b942" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="630" stroke="#f5b942" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#f5b942" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="630" stroke="#f5b942" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#f5b942" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="630" stroke="#f5b942" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#f5b942" stroke-width="1"/>
    <line x1="1050" y1="0" x2="1050" y2="630" stroke="#f5b942" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#f5b942" stroke-width="1"/>
  </g>

  <!-- Sunrise arc -->
  <ellipse cx="180" cy="560" rx="280" ry="200" fill="none" stroke="#f5b942" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="180" cy="560" rx="210" ry="150" fill="none" stroke="#f5b942" stroke-width="1" opacity="0.18"/>
  <ellipse cx="180" cy="560" rx="140" ry="100" fill="none" stroke="#f5b942" stroke-width="0.8" opacity="0.12"/>

  <!-- Rising sun rays -->
  <g opacity="0.15" transform="translate(180, 560)">
    <line x1="0" y1="0" x2="-250" y2="-280" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="0" x2="-170" y2="-310" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="0" x2="-80" y2="-320" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="0" x2="20" y2="-320" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="0" x2="120" y2="-300" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="0" x2="200" y2="-260" stroke="#f5b942" stroke-width="1"/>
    <line x1="0" y1="0" x2="270" y2="-210" stroke="#f5b942" stroke-width="1"/>
  </g>

  <!-- Candlestick chart decoration (right side) -->
  <g opacity="0.15" transform="translate(850, 80)">
    <!-- Candles -->
    <rect x="0" y="120" width="18" height="80" fill="#22c55e" rx="2"/>
    <line x1="9" y1="100" x2="9" y2="120" stroke="#22c55e" stroke-width="2"/>
    <line x1="9" y1="200" x2="9" y2="220" stroke="#22c55e" stroke-width="2"/>

    <rect x="30" y="90" width="18" height="100" fill="#22c55e" rx="2"/>
    <line x1="39" y1="70" x2="39" y2="90" stroke="#22c55e" stroke-width="2"/>
    <line x1="39" y1="190" x2="39" y2="210" stroke="#22c55e" stroke-width="2"/>

    <rect x="60" y="140" width="18" height="60" fill="#ef4444" rx="2"/>
    <line x1="69" y1="125" x2="69" y2="140" stroke="#ef4444" stroke-width="2"/>
    <line x1="69" y1="200" x2="69" y2="215" stroke="#ef4444" stroke-width="2"/>

    <rect x="90" y="100" width="18" height="90" fill="#22c55e" rx="2"/>
    <line x1="99" y1="80" x2="99" y2="100" stroke="#22c55e" stroke-width="2"/>
    <line x1="99" y1="190" x2="99" y2="208" stroke="#22c55e" stroke-width="2"/>

    <rect x="120" y="70" width="18" height="110" fill="#22c55e" rx="2"/>
    <line x1="129" y1="50" x2="129" y2="70" stroke="#22c55e" stroke-width="2"/>
    <line x1="129" y1="180" x2="129" y2="198" stroke="#22c55e" stroke-width="2"/>

    <rect x="150" y="110" width="18" height="70" fill="#ef4444" rx="2"/>
    <line x1="159" y1="95" x2="159" y2="110" stroke="#ef4444" stroke-width="2"/>
    <line x1="159" y1="180" x2="159" y2="196" stroke="#ef4444" stroke-width="2"/>

    <rect x="180" y="60" width="18" height="120" fill="#22c55e" rx="2"/>
    <line x1="189" y1="40" x2="189" y2="60" stroke="#22c55e" stroke-width="2"/>
    <line x1="189" y1="180" x2="189" y2="200" stroke="#22c55e" stroke-width="2"/>

    <rect x="210" y="30" width="18" height="130" fill="#22c55e" rx="2"/>
    <line x1="219" y1="10" x2="219" y2="30" stroke="#22c55e" stroke-width="2"/>
    <line x1="219" y1="160" x2="219" y2="178" stroke="#22c55e" stroke-width="2"/>

    <rect x="240" y="80" width="18" height="80" fill="#ef4444" rx="2"/>
    <line x1="249" y1="65" x2="249" y2="80" stroke="#ef4444" stroke-width="2"/>
    <line x1="249" y1="160" x2="249" y2="176" stroke="#ef4444" stroke-width="2"/>

    <rect x="270" y="40" width="18" height="120" fill="#22c55e" rx="2"/>
    <line x1="279" y1="20" x2="279" y2="40" stroke="#22c55e" stroke-width="2"/>
    <line x1="279" y1="160" x2="279" y2="178" stroke="#22c55e" stroke-width="2"/>
  </g>

  <!-- Line chart overlay (right side) -->
  <polyline points="850,380 890,340 930,360 970,300 1010,270 1050,240 1090,210 1130,180 1170,150" 
    fill="none" stroke="#f5b942" stroke-width="2.5" opacity="0.3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Dots on line -->
  <g fill="#f5b942" opacity="0.4">
    <circle cx="850" cy="380" r="4"/>
    <circle cx="930" cy="360" r="4"/>
    <circle cx="1010" cy="270" r="4"/>
    <circle cx="1090" cy="210" r="4"/>
    <circle cx="1170" cy="150" r="5" filter="url(#glow)"/>
  </g>

  <!-- Top gold bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#goldLine)" opacity="0.8"/>

  <!-- Bottom gold bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#goldLine)" opacity="0.8"/>

  <!-- Left accent vertical bar -->
  <rect x="60" y="80" width="4" height="470" fill="#f5b942" opacity="0.7" rx="2"/>

  <!-- BullSignal brand pill -->
  <rect x="80" y="80" width="160" height="34" rx="17" fill="#f5b942" opacity="0.15"/>
  <rect x="80" y="80" width="160" height="34" rx="17" fill="none" stroke="#f5b942" stroke-width="1.2" opacity="0.6"/>
  <text x="160" y="103" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" 
    fill="#f5b942" text-anchor="middle" letter-spacing="2" opacity="0.9">BULLSIGNAL</text>

  <!-- MORNING MARKET WATCH headline -->
  <text x="80" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400" 
    fill="#f5b942" letter-spacing="6" opacity="0.75">MORNING</text>
  
  <text x="77" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" 
    fill="#ffffff" letter-spacing="-1" filter="url(#textGlow)" opacity="0.95">MARKET</text>

  <text x="77" y="395" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" 
    fill="#f5b942" letter-spacing="-1" filter="url(#textGlow)">WATCH</text>

  <!-- Divider line -->
  <rect x="80" y="420" width="380" height="2" fill="url(#goldLine)" opacity="0.6"/>

  <!-- Date -->
  <text x="80" y="460" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="300" 
    fill="#ffffff" letter-spacing="3" opacity="0.85">JUNE 25, 2026</text>

  <!-- Subtext -->
  <text x="80" y="500" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" 
    fill="#94b4d4" letter-spacing="1" opacity="0.8">Indian Markets Daily Briefing</text>

  <!-- Key stats row -->
  <g transform="translate(80, 540)">
    <!-- NIFTY stat -->
    <rect x="0" y="0" width="140" height="52" rx="8" fill="#ffffff" opacity="0.06"/>
    <text x="10" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94b4d4" letter-spacing="1">NIFTY 50</text>
    <text x="10" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#22c55e">24,169</text>
    <text x="82" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#22c55e">▲0.61%</text>

    <!-- SENSEX stat -->
    <rect x="155" y="0" width="155" height="52" rx="8" fill="#ffffff" opacity="0.06"/>
    <text x="165" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94b4d4" letter-spacing="1">SENSEX</text>
    <text x="165" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#22c55e">77,509</text>
    <text x="248" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#22c55e">▲0.67%</text>

    <!-- Brent stat -->
    <rect x="325" y="0" width="145" height="52" rx="8" fill="#ffffff" opacity="0.06"/>
    <text x="335" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94b4d4" letter-spacing="1">BRENT CRUDE</text>
    <text x="335" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ef4444">$73.05</text>
    <text x="405" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ef4444">▼5.23%</text>
  </g>

  <!-- Corner decoration -->
  <circle cx="1160" cy="580" r="80" fill="#f5b942" opacity="0.04"/>
  <circle cx="1160" cy="580" r="55" fill="#f5b942" opacity="0.05"/>
  <circle cx="1160" cy="580" r="30" fill="#f5b942" opacity="0.07"/>
</svg>
