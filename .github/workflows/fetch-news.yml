name: Fetch News (30 min)

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger
  push:
    branches: [main]
    paths-ignore:
      - 'public/data/news.json'  # prevent infinite loop when workflow itself pushes

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic --break-system-packages

      - name: Fetch news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/fetch_news.py

      - name: Commit updated news
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --staged --quiet || git commit -m "chore: refresh news [$(date -u '+%H:%M UTC')]"

      - name: Push
        run: |
          # Rebase, resolving any news.json conflict by keeping our fresh fetch
          git pull --rebase -X ours origin main || (
            git checkout --ours public/data/news.json &&
            git add public/data/news.json &&
            git rebase --continue
          )
          git push origin main
